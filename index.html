<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par's Word Search</title>
    <link rel= "stylesheet" href="index.css">
</head>
<body>
    <h1>Caspar's Word Search Woohoo!</h1>

    <div class="bothContainer">

        <div class="leftSide">
        
            <div class="wordContainer">
                <h2>7 words:</h2>
                <ul id="foundwords"></ul>
            </div>

            <div class="buttonContainer">
                <button id="hint">Penge Hint!!</button>
                <button id="giveUp">Akin na yung words bro</button>
            </div>

        </div>

        <div class="gridContainer"></div>
            
        <div class="characterContainer">

            <div class="bubbleText">
                <img id="pixelBubble" src="images/pixelBubble.png" alt="lol">

                <div id="pixelText">
                    lol word search para sayo kaya mo yan! basta
                    premise niyan kung may sagot ka pindutin mo
                    first letter and last letter para mahighlight syempre di ko
                    bibigay sayo word list para mahirapan ka goodluck !!
                </div>
            </div>
            <img id="piaPixel" src="images/piaPixel.png" alt="lol">
            
        </div>
        
    </div>    
    
    <script src="index.js"></script>
</body>
</html>
